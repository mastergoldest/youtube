<!doctype html>
<html>
<head>
  <title>youtube interface clone</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
  <!-- header-section -->
   <section>
    <header class="relative">
      <div class="flex flex-row w-full justify-between pl-5 pr-5 md:pl-15 md:pr-10 py-3 items-center">
        <div class="font-stretch-50% text-xl font-bold"><i class="fa-brands fa-youtube text-red-600"></i>YouTube <span class="relative text-black/50 text-xs -top-2 -left-0.5 font-semibold">NG</span></div>
        <div class="hidden md:flex items-center gap-4">
        <div class="flex items-center ">
          <input type="text" placeholder="search" class=" border border-black/30 py-2 px-3 rounded-l-full outline-none focus:border-blue-500/50 w-xs"><div class="py-2 px-4 border border-black/30 rounded-r-full bg-black/10"><i class="fa-solid fa-magnifying-glass"></i></div></div> <div class="rounded-full bg-black/10 h-10 w-10 flex items-center justify-center"><i class="fa-solid fa-microphone text-2xl "></i></div></div>
          <div class="gap-6 flex items-center">
            <div><i class="fa-brands fa-chromecast md:hidden text-2xl"></i></div><div class="items-center md:flex hidden">
          <i class="fa-solid fa-plus text-2xl"></i> <span>Create</span></div>
        <div><i class="fa-solid fa-bell text-2xl"></i></div> <div class="h-10 w-10 rounded-full bg-green-500 hidden md:flex items-center justify-center"><p>M</p></div> <div class=""><i class="fa-solid fa-magnifying-glass"></i></div></div>
      </div>
    </header>
    <label class="hidden md:flex">
          <button id="hamburger-menu" class="relative text-3xl w-8 h-8 cursor-pointer -top-12 left-3.5 z-10">
            <div class="absolute  bg-black  
            w-8 h-0.5 top-4 rounded transition-all duration-500 before:content-[''] before:bg-black
             before:w-8 before:h-0.5 before:rounded before:absolute before:-translate-x-4 before:-translate-y-2 before:transition-all before:duration-500 after:content-[''] after:bg-black after:w-8 after:h-0.5 after:rounded after:absolute after:-translate-x-4 after:translate-y-2 after:transition-all after:duration-500">
          </div>
         </button>
        </div>
        </label> 
   </section>
